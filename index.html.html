<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Neon Runner - دكتور محمد</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0; overflow:hidden; background:#050816; color:#fff;
    font-family: Tahoma, Arial, sans-serif; user-select:none; touch-action:manipulation;
  }
  canvas{display:block;width:100vw;height:100vh}
  #hud{
    position:fixed;top:12px;left:12px;right:12px;z-index:5;
    display:flex;justify-content:space-between;align-items:center;
    font-weight:800;text-shadow:0 2px 8px #000;font-size:15px;
    pointer-events:none;
  }
  #hud div{
    background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12);
    padding:8px 10px;border-radius:14px;backdrop-filter:blur(8px);
  }
  .overlay{
    position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center;padding:22px;
    background:radial-gradient(circle at top, rgba(52,211,153,.18), rgba(0,0,0,.72) 55%);
  }
  h1{font-size:38px;margin:0 0 8px;color:#ffd166;text-shadow:0 0 22px rgba(255,209,102,.7)}
  p{line-height:1.8;margin:6px 0}
  button{
    border:0;background:linear-gradient(135deg,#ffd166,#f59e0b);
    color:#121212;font-size:19px;font-weight:900;border-radius:18px;
    padding:14px 30px;margin-top:16px;box-shadow:0 12px 28px rgba(245,158,11,.25);
  }
  .small{font-size:13px;opacity:.9;color:#d1d5db}
  .gold{color:#ffd166;font-weight:900}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="score">النقاط: 0</div>
  <div id="level">المرحلة: 1</div>
  <div id="best">الأفضل: 0</div>
</div>

<div class="overlay" id="menu">
  <h1>NEON RUNNER</h1>
  <p>لعبة دكتور محمد</p>
  <p>اقفز وتجنب العوائق. عندك قفزتين بالهواء.</p>
  <p class="small">اضغط الشاشة أو زر Space للقفز — اضغط مرتين للقفزة الثانية</p>
  <p class="gold">© دكتور محمد — جميع الحقوق محفوظة</p>
  <button onclick="startGame()">ابدأ اللعب</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const menu = document.getElementById("menu");
const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const bestEl = document.getElementById("best");

let W,H,groundY;
let player, obstacles, coins, sparks, score, level, speed, gravity, running, dead, frame;
let best = Number(localStorage.getItem("dr_mohammed_runner_best") || 0);
bestEl.textContent = "الأفضل: " + best;

function resize(){
  W = canvas.width = innerWidth * devicePixelRatio;
  H = canvas.height = innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  W = innerWidth; H = innerHeight; groundY = H * 0.78;
}
addEventListener("resize", resize); resize();

function beep(freq=440, dur=.08, type="sine", gain=.05){
  try{
    const ac = beep.ac || (beep.ac = new (window.AudioContext||window.webkitAudioContext)());
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.value = freq; o.type = type; g.gain.value = gain;
    o.connect(g); g.connect(ac.destination); o.start();
    g.gain.exponentialRampToValueAtTime(.001, ac.currentTime + dur);
    o.stop(ac.currentTime + dur);
  }catch(e){}
}

function music(){
  if(!running) return;
  const notes = [220,277,330,415,330,277];
  beep(notes[Math.floor(frame/18)%notes.length], .05, "triangle", .018);
  setTimeout(music, 170);
}

function reset(){
  player = {x:92,y:groundY-68,w:45,h:62,vy:0,jumps:0,runStep:0,shield:0};
  obstacles=[]; coins=[]; sparks=[];
  score=0; level=1; speed=6.2; gravity=.76; running=true; dead=false; frame=0;
  spawnObstacle();
  spawnCoinLine();
}

function startGame(){
  menu.style.display="none";
  reset();
  music();
  requestAnimationFrame(loop);
}

function jump(){
  if(dead){ startGame(); return; }
  if(!running) return;
  if(player.jumps < 2){
    player.vy = player.jumps === 0 ? -15.5 : -13.2;
    player.jumps++;
    beep(player.jumps===1?520:760,.07,"square",.035);
    burst(player.x+player.w/2, player.y+player.h, "#ffd166", 14);
  }
}
addEventListener("pointerdown", jump);
addEventListener("keydown", e => { if(e.code==="Space") jump(); });

function spawnObstacle(){
  const types = [
    {name:"box", w:42, h:48},
    {name:"tall", w:36, h:76},
    {name:"spike", w:55, h:44}
  ];
  const t = types[Math.floor(Math.random()*types.length)];
  obstacles.push({x:W+80, y:groundY-t.h, w:t.w, h:t.h, type:t.name, passed:false});
}
function spawnCoinLine(){
  const baseX = W + 220 + Math.random()*180;
  const y = groundY - (105 + Math.random()*70);
  for(let i=0;i<5;i++) coins.push({x:baseX+i*34,y,w:17,h:17,taken:false});
}
function burst(x,y,color,n=10){
  for(let i=0;i<n;i++) sparks.push({
    x,y, vx:Math.random()*6-3, vy:Math.random()*-5-1,
    life:25+Math.random()*18, color
  });
}

function update(){
  frame++;
  score += .18 + level*.02;
  level = 1 + Math.floor(score/90);
  speed = 6.2 + level*.55;

  player.vy += gravity;
  player.y += player.vy;
  player.runStep += .24 + speed*.015;

  if(player.y + player.h >= groundY){
    player.y = groundY - player.h;
    player.vy = 0; player.jumps = 0;
  }

  for(const o of obstacles) o.x -= speed;
  obstacles = obstacles.filter(o=>o.x+o.w>-80);
  const last = obstacles[obstacles.length-1];
  if(!last || W-last.x > 250 + Math.random()*160) spawnObstacle();

  for(const c of coins) c.x -= speed;
  coins = coins.filter(c=>c.x>-50 && !c.taken);
  if(coins.length < 5 && Math.random()<.018) spawnCoinLine();

  for(const c of coins){
    if(hit(player,c)){
      c.taken=true; score += 7;
      beep(980,.05,"sine",.035);
      burst(c.x,c.y,"#facc15",9);
    }
  }

  for(const o of obstacles){
    if(hit(player,o)) return gameOver();
  }

  for(const s of sparks){s.x+=s.vx;s.y+=s.vy;s.vy+=.22;s.life--}
  sparks = sparks.filter(s=>s.life>0);

  scoreEl.textContent = "النقاط: " + Math.floor(score);
  levelEl.textContent = "المرحلة: " + level;
}

function hit(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#09132e"); g.addColorStop(.55,"#111827"); g.addColorStop(1,"#050816");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  ctx.fillStyle="rgba(255,255,255,.75)";
  for(let i=0;i<70;i++){
    const x=(i*83-frame*0.55)%W, y=(i*47)%(groundY-90);
    ctx.fillRect(x<0?x+W:x,y,2,2);
  }

  ctx.fillStyle="rgba(56,189,248,.12)";
  for(let i=0;i<8;i++){
    const bw=55, bh=80+(i%4)*35;
    const x=(i*150-frame*1.2)% (W+180) -80;
    ctx.fillRect(x, groundY-bh, bw, bh);
    ctx.fillStyle="rgba(255,209,102,.28)";
    for(let j=0;j<4;j++) ctx.fillRect(x+10, groundY-bh+18+j*18, 8, 5);
    ctx.fillStyle="rgba(56,189,248,.12)";
  }
}

function drawGround(){
  ctx.fillStyle="#172554"; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle="#22d3ee"; ctx.fillRect(0,groundY,W,4);
  ctx.strokeStyle="rgba(34,211,238,.25)"; ctx.lineWidth=1;
  for(let x=(-frame*speed)%46;x<W;x+=46){
    ctx.beginPath(); ctx.moveTo(x,groundY); ctx.lineTo(x-70,H); ctx.stroke();
  }
  for(let y=groundY+28;y<H;y+=28){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
}

function round(x,y,w,h,r,color){
  ctx.fillStyle=color; ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.fill();
}

function drawPlayer(){
  const x=player.x,y=player.y,w=player.w,h=player.h;
  round(x,y,w,h,12,"#38bdf8");
  round(x+7,y+10,w-14,18,8,"#0f172a");
  ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(x+31,y+19,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#22c55e"; ctx.fillRect(x+9,y+h-8,11,18+Math.sin(player.runStep)*4);
  ctx.fillRect(x+w-20,y+h-8,11,18-Math.sin(player.runStep)*4);
  ctx.fillStyle="rgba(255,255,255,.22)"; ctx.fillRect(x+8,y+6,w-16,4);
}

function drawObstacles(){
  for(const o of obstacles){
    if(o.type==="spike"){
      ctx.fillStyle="#ef4444";
      ctx.beginPath();
      ctx.moveTo(o.x,groundY); ctx.lineTo(o.x+o.w/2,o.y); ctx.lineTo(o.x+o.w,groundY); ctx.closePath(); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.22)"; ctx.fillRect(o.x+18,o.y+18,12,5);
    }else{
      round(o.x,o.y,o.w,o.h,8,o.type==="tall"?"#fb7185":"#f97316");
      ctx.fillStyle="rgba(255,255,255,.18)"; ctx.fillRect(o.x+7,o.y+8,o.w-14,5);
    }
  }
}

function drawCoins(){
  for(const c of coins){
    ctx.fillStyle="#facc15";
    ctx.beginPath(); ctx.arc(c.x,c.y,10+Math.sin(frame*.15)*1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#92400e"; ctx.font="bold 11px Tahoma"; ctx.textAlign="center"; ctx.fillText("$",c.x,c.y+4);
  }
}

function drawSparks(){
  for(const s of sparks){
    ctx.globalAlpha=Math.max(0,s.life/40);
    ctx.fillStyle=s.color; ctx.fillRect(s.x,s.y,4,4);
    ctx.globalAlpha=1;
  }
}

function draw(){
  drawBackground(); drawGround(); drawCoins(); drawObstacles(); drawPlayer(); drawSparks();
  ctx.fillStyle="rgba(255,209,102,.85)";
  ctx.font="bold 13px Tahoma"; ctx.textAlign="left";
  ctx.fillText("© دكتور محمد", 14, H-14);
}

function gameOver(){
  running=false; dead=true;
  beep(120,.22,"sawtooth",.05);
  burst(player.x+20,player.y+20,"#ef4444",28);
  const finalScore = Math.floor(score);
  if(finalScore > best){
    best = finalScore;
    localStorage.setItem("dr_mohammed_runner_best", best);
  }
  bestEl.textContent = "الأفضل: " + best;
  setTimeout(()=>{
    menu.innerHTML = `
      <h1>خسرت 😅</h1>
      <p>نقاطك: <b>${finalScore}</b></p>
      <p>وصلت إلى المرحلة: <b>${level}</b></p>
      <p class="gold">أعلى نتيجة: ${best}</p>
      <p class="small">اضغط الشاشة أو Space حتى تعيد اللعب</p>
      <p class="gold">© دكتور محمد</p>
      <button onclick="startGame()">إعادة اللعب</button>`;
    menu.style.display="flex";
  },250);
}

function loop(){
  if(!running) return;
  update(); draw();
  requestAnimationFrame(loop);
}
drawBackground(); drawGround();
</script>
</body>
</html>
